name: Node.js to AWS S3 CI/CD

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 코드 체크아웃
        uses: actions/checkout@v4

      - name: 2. Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. 의존성 설치 및 테스트
        run: |
          npm ci
          npm test

      - name: 4. 프로젝트 빌드
        run: |
          npm run build

      - name: 5. AWS 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: 6. S3에 배포
        run: |
          aws s3 sync ./dist s3://ronaldo2goal-today-hoho --delete